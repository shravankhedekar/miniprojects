name: Terraform CI/CD Checks

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.tf'
      - '**.tfvars'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.tf'
      - '**.tfvars'

env:
  TERRAFORM_VERSION: 1.5.0

jobs:
  validate:
    name: Terraform Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      
      - name: Terraform Format Check
        id: fmt
        run: |
          echo "Checking Terraform code formatting..."
          terraform fmt -check -recursive .
          echo "✓ Format check passed"
      
      - name: Terraform Init (for validation)
        id: init
        run: |
          echo "Initializing Terraform..."
          terraform init -backend=false
      
      - name: Terraform Validate
        id: validate
        run: |
          echo "Validating Terraform configuration..."
          terraform validate
          echo "✓ Validation passed"

  lint:
    name: TFLint Security & Best Practices
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: latest
      
      - name: Show TFLint Version
        run: tflint --version
      
      - name: Initialize TFLint
        run: tflint --init
      
      - name: Run TFLint
        id: tflint
        run: |
          echo "Running TFLint checks..."
          tflint . --format compact
          echo "✓ TFLint checks passed"
        continue-on-error: true
      
      - name: TFLint Summary
        if: always()
        run: |
          if [ ${{ steps.tflint.outcome }} == 'failure' ]; then
            echo "⚠️  TFLint found issues (non-blocking)"
            exit 0
          else
            echo "✓ TFLint checks passed"
          fi

  security:
    name: Checkov Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Run Checkov Scan
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          quiet: false
          soft_fail: true
          output_format: cli
      
      - name: Security Scan Summary
        if: always()
        run: |
          echo "✓ Security scan completed"
          echo "Review results above for any critical issues"

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
      
      - name: Terraform Init
        id: init
        run: terraform init -backend=false
      
      - name: Terraform Plan (Dev Environment)
        id: plan
        run: |
          echo "Generating Terraform plan..."
          terraform plan -var-file=terraform.tfvars -out=tfplan -no-color
        continue-on-error: true
      
      - name: Plan Summary
        if: always()
        run: echo "✓ Terraform plan generated successfully"

  summary:
    name: Checks Summary
    runs-on: ubuntu-latest
    needs: [validate, lint, security, plan]
    if: always()
    
    steps:
      - name: Print Workflow Results
        run: |
          echo "╔════════════════════════════════════════════════════╗"
          echo "║         TERRAFORM CI/CD CHECK RESULTS              ║"
          echo "╠════════════════════════════════════════════════════╣"
          echo "║ Validation: ${{ needs.validate.result }}           ║"
          echo "║ Linting:    ${{ needs.lint.result }}               ║"
          echo "║ Security:   ${{ needs.security.result }}           ║"
          echo "║ Plan:       ${{ needs.plan.result }}               ║"
          echo "╚════════════════════════════════════════════════════╝"
          
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "❌ Validation failed - Fix format and syntax errors"
            exit 1
          fi
          
          echo "✓ All required checks passed!"
      
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const validate = '${{ needs.validate.result }}';
            const lint = '${{ needs.lint.result }}';
            const security = '${{ needs.security.result }}';
            const plan = '${{ needs.plan.result }}';
            
            const summary = `## Terraform CI/CD Check Results
            
            | Check | Status |
            |-------|--------|
            | ✅ Validation | ${validate} |
            | 📋 Linting | ${lint} |
            | 🔒 Security | ${security} |
            | 📊 Plan | ${plan} |
            
            ✓ All automated checks have completed. Review logs for details.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

# Checkov Configuration
# This file customizes Checkov security scanning behavior

framework:
  - terraform

# Skip overly strict checks that don't apply to dev environment
# Uncomment specific checks as needed
# skip-check:
#   - CKV_AWS_1   # Example: EBS encryption
#   - CKV_AWS_20  # Example: S3 block public access

# Compact output format
compact: true

# Quiet mode - only show summary
quiet: false
